# GTG Reminder — konfigurace
window:
  start: "08:00"        # začátek aktivního okna
  end: "16:00"          # konec aktivního okna
  max_extension_hours: 2  # max prodloužení při snoozu

scheduling:
  min_gap_minutes: 15   # minimální odstup mezi sety
  daily_reps_target:    # cílový denní počet opakování per cvik (pro výpočet base setů)
    min: 15
    max: 30

cycle:
  work_days: 3          # počet cvičebních dnů v cyklu
  rest_days: 1          # počet dnů odpočinku
  recalibrate_after_cycles: 2  # po kolika cyklech vyzvat k novému max reps

snooze_options_minutes: [15, 30, 60]

ntfy:
  base_url: "https://ntfy.sh"
  topic: "gogtg-for-all"

exercises:
  - id: oap
    name: "OAP"
    unit: reps
  - id: ols
    name: "OLS"
    unit: reps
  - id: pullup
    name: "Shyb"
    unit: reps

timezone: "Europe/Prague"
